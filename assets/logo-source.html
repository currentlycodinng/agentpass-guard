<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; }
  body { display: grid; gap: 40px; padding: 40px; font-family: Inter, system-ui, sans-serif; }

  /* ===== Square mark (icon) ===== */
  .mark {
    width: 1024px; height: 1024px;
    border-radius: 224px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #14F195 0%, #00D1FF 55%, #9945FF 100%);
    display: grid; place-items: center;
    box-shadow: 0 80px 160px rgba(11,16,32,0.18);
  }
  .mark::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 25% 20%, rgba(255,255,255,0.30), transparent 40%),
      radial-gradient(circle at 75% 80%, rgba(11,16,32,0.18), transparent 50%);
  }
  .mark::after {
    content: ""; position: absolute; inset: 24px;
    border-radius: 200px;
    border: 4px solid rgba(255,255,255,0.18);
  }
  .mark span {
    position: relative; z-index: 1;
    color: #06140F;
    font-weight: 900;
    font-size: 460px;
    letter-spacing: -0.04em;
    line-height: 1;
    text-shadow: 0 4px 0 rgba(255,255,255,0.18);
  }

  /* ===== Square mark on dark (alt) ===== */
  .mark-dark {
    width: 1024px; height: 1024px;
    border-radius: 224px;
    position: relative;
    overflow: hidden;
    background: #0B1020;
    display: grid; place-items: center;
    box-shadow: 0 80px 160px rgba(11,16,32,0.18);
  }
  .mark-dark::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 30% 25%, rgba(0,209,255,0.30), transparent 50%),
      radial-gradient(circle at 70% 75%, rgba(153,69,255,0.30), transparent 50%),
      radial-gradient(circle at 50% 110%, rgba(20,241,149,0.20), transparent 50%);
  }
  .mark-dark::after {
    content: ""; position: absolute; inset: 24px;
    border-radius: 200px;
    border: 4px solid rgba(255,255,255,0.10);
  }
  .mark-dark span {
    position: relative; z-index: 1;
    background: linear-gradient(120deg, #14F195 0%, #00D1FF 50%, #9945FF 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    font-weight: 900;
    font-size: 460px;
    letter-spacing: -0.04em;
    line-height: 1;
  }

  /* ===== Wide banner / wordmark ===== */
  .banner {
    width: 1600px; height: 800px;
    background: #0B1020;
    position: relative;
    overflow: hidden;
    display: grid; place-items: center;
  }
  .banner::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(800px 400px at 20% 30%, rgba(0,209,255,0.18), transparent 60%),
      radial-gradient(700px 380px at 80% 70%, rgba(153,69,255,0.20), transparent 60%),
      radial-gradient(600px 350px at 50% 110%, rgba(20,241,149,0.16), transparent 60%);
  }
  .banner-inner {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 36px;
  }
  .banner-mark {
    width: 200px; height: 200px;
    border-radius: 44px;
    background: linear-gradient(135deg, #14F195 0%, #00D1FF 55%, #9945FF 100%);
    display: grid; place-items: center;
    color: #06140F;
    font-weight: 900;
    font-size: 100px;
    letter-spacing: -0.04em;
    box-shadow: 0 20px 40px rgba(20,241,149,0.30);
  }
  .banner-text { display: grid; gap: 8px; }
  .banner-text .name {
    color: #fff; font-weight: 800; font-size: 96px;
    letter-spacing: -0.025em; line-height: 1;
  }
  .banner-text .tag {
    color: #98A3C7; font-weight: 500; font-size: 32px;
    letter-spacing: -0.005em;
  }

  /* ===== Light banner ===== */
  .banner-light {
    width: 1600px; height: 800px;
    background: #fff;
    position: relative;
    overflow: hidden;
    display: grid; place-items: center;
    border: 2px solid #E6E8F0;
  }
  .banner-light::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(153,69,255,0.10), transparent 60%),
      radial-gradient(700px 400px at 0% 5%, rgba(0,209,255,0.10), transparent 55%),
      radial-gradient(600px 350px at 50% 110%, rgba(20,241,149,0.10), transparent 60%);
  }
  .banner-light .banner-text .name { color: #0B1020; }
  .banner-light .banner-text .tag { color: #6B7393; }
</style>
</head>
<body>

<!-- 1. Square gradient mark (light bg) -->
<div class="mark" id="mark-light"><span>AP</span></div>

<!-- 2. Square dark mark with gradient text -->
<div class="mark-dark" id="mark-dark"><span>AP</span></div>

<!-- 3. Wide dark banner -->
<div class="banner" id="banner-dark">
  <div class="banner-inner">
    <div class="banner-mark">AP</div>
    <div class="banner-text">
      <div class="name">AgentPass Guard</div>
      <div class="tag">Policy guard for agent API spend on Solana</div>
    </div>
  </div>
</div>

<!-- 4. Wide light banner -->
<div class="banner banner-light" id="banner-light">
  <div class="banner-inner">
    <div class="banner-mark">AP</div>
    <div class="banner-text">
      <div class="name">AgentPass Guard</div>
      <div class="tag">Policy guard for agent API spend on Solana</div>
    </div>
  </div>
</div>

</body>
</html>
